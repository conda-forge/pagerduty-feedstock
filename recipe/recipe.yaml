schema_version: 1

context:
  name: pagerduty
  version: "6.3.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pagerduty-${{ version }}.tar.gz
  sha256: 80d32cd91f27214878cc91ba23eabb6d393d4a434d883936a0387a58a041e4e0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pagerduty = pagerduty.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build
    - pip
  run:
    - python >=${{ python_min }}
    - httpx

tests:
  - python:
      imports:
        - pagerduty
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pagerduty --help

about:
  summary: Clients for PagerDuty's Public APIs
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/PagerDuty/python-pagerduty
  repository: https://github.com/PagerDuty/python-pagerduty
  documentation: https://pagerduty.github.io/python-pagerduty/user_guide.html

extra:
  recipe-maintainers:
    - xylar
