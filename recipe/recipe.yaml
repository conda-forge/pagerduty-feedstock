schema_version: 1

context:
  name: pagerduty
  version: 6.2.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pagerduty-${{ version }}.tar.gz
  sha256: 96d8b06041d5e268a64506a127af1b4dea8e74d94f6aaef3ea7d940b960a0a17

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pagerduty = pagerduty.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build
    - pip
  run:
    - python >=${{ python_min }}
    - httpx

tests:
  - python:
      imports:
        - pagerduty
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - pip check
      - pagerduty --help

about:
  summary: Clients for PagerDuty's Public APIs
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/PagerDuty/python-pagerduty
  repository: https://github.com/PagerDuty/python-pagerduty
  documentation: https://pagerduty.github.io/python-pagerduty/user_guide.html

extra:
  recipe-maintainers:
    - xylar
